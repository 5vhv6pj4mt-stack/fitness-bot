<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Стать — фитнес</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function() {
        var attempts = 0;
        function initWebApp() {
          attempts++;
          if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
          } else if (attempts < 5) {
            setTimeout(initWebApp, 200 * attempts);
          }
        }
        initWebApp();
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="splash" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1c1c1e;color:#8e8e93;font-family:sans-serif;font-size:14px">
        Загрузка...
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
